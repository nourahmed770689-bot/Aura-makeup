<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - AURA</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .checkout-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }

        .checkout-container h1 {
            font-family: inherit;
            color: #703B3B;
            text-align: center;
            margin-bottom: 30px;
        }

        .checkout-form {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }

        .order-summary {
            background: #f7e6e0;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .order-summary h3 {
            color: #703B3B;
            margin-top: 0;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #ddd;
        }

        .order-total {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            color: #703B3B;
            font-size: 18px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #703B3B;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #333;
            font-weight: bold;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .checkout-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .place-order-btn,
        .back-btn {
            padding: 14px 28px;
            border-radius: 8px;
            min-width: 160px;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }

        .place-order-btn {
            background: #703B3B;
            color: white;
        }

        .place-order-btn:hover {
            background: #5a2f2f;
        }

        .back-btn {
            background: #6c757d;
            color: white;
        }

        .back-btn:hover {
            background: #5a6268;
        }

        .confirmation-message {
            display: none;
            background: #d4edda;
            color: #155724;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #c3e6cb;
        }

        .order-summary {
            background: #f7e6e0;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .home-btn {
            display: none;
            background: #703B3B;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px 28px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        .home-btn:hover {
            background: #5a2f2f;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .checkout-actions {
                flex-direction: column;
            }

            .place-order-btn,
            .back-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="navbar">
    <a href="Home.html">Home</a>
   <div class="dropdown">
        <button onclick="toggleDropdown()" class="dropbtn">Products <i class="fas fa-caret-down"></i></button>
        <div id="dropdown-content" class="dropdown-content">
            <a href="Products.html">All Products</a>
            <a href="Products.html?category=face">Face</a>
            <a href="Products.html?category=eyes">Eyes</a>
            <a href="Products.html?category=lips">Lips</a>
            <a href="Products.html?category=blusher">Blusher</a>
        </div>
    </div>
    <a href="Tips.html">Tips</a>
    <span class="logo">AURA</span>
    <a href="Gallery.html">Gallery</a>
    <a href="Contact.html">Contact</a>
    <a href="Cart.html">🛒 Cart (<span id="cartCount">0</span>)</a>
    <div class="search-icon" onclick="openSearchPopup()">
        <i class="fas fa-search"></i>
    </div>
</div>

<div id="searchOverlay" class="search-overlay" onclick="closeSearchPopupOnOverlay(event)">
    <div class="search-popup">
        <form onsubmit="performSearch(); return false;">
            <input type="text" id="searchPopupInput" placeholder="WHAT ARE YOU LOOKING FOR?" autocomplete="off">
            <button type="submit"> Search</button>
        </form>
    </div>
    <button class="close-search" onclick="closeSearchPopup()">✕</button>
</div>

<div class="checkout-container">
    <h1>Checkout 💳</h1>

    <div class="order-summary">
        <div class="confirmation-message" id="confirmationMessage">
            <h3>✅ Order Placed Successfully!</h3>
            <p id="orderDetails"></p>
        </div>
        <h3>Order Summary</h3>
        <div id="orderSummary"></div>
        <button type="button" id="homeButton" class="back-btn home-btn" onclick="window.location.href='Home.html'">Back to Home</button>
    </div>
   
    <form class="checkout-form" id="checkoutForm" action="DB_order.php" method="POST" onsubmit="event.preventDefault(); submitOrder();">
        <div class="error-message" id="errorMessage"></div>

        <h3 style="color: #703B3B; margin-top: 0;">Customer Information</h3>

        <div class="form-row">
            <div class="form-group">
                <label for="firstName">First Name *</label>
                <input type="text" id="firstName" name="First_Name" required>
            </div>
            <div class="form-group">
                <label for="lastName">Last Name *</label>
                <input type="text" id="lastName" name="Last_Name" required>
            </div>
        </div>

        <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" name="Email" required>
        </div>

        <div class="form-group">
            <label for="phone">Phone Number *</label>
            <input type="tel" id="phone" name="Phone" required>
        </div>

        <h3 style="color: #703B3B;">Shipping Address</h3>

        <div class="form-group">
            <label for="address">Address *</label>
            <input type="text" id="address" name="Address" required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="city">City *</label>
                <input type="text" id="city" name="City" required>
            </div>
            <div class="form-group">
                <label for="zipCode">Zip Code *</label>
                <input type="text" id="zipCode" name="Zip_Code" required>
            </div>
        </div>

        <div class="form-group">
            <label for="notes">Additional Notes</label>
            <textarea id="notes" name="Notes" placeholder="Special requests or delivery instructions..."></textarea>
        </div>

        <div class="checkout-actions">
            <button type="button" class="back-btn" onclick="window.location.href='Cart.html'">Back to Cart</button>
            <button type="submit" class="place-order-btn">Place Order</button>
        </div>
    </form>
</div>


<script src="Script.js"></script>
<script>
// Display order summary on page load
document.addEventListener('DOMContentLoaded', function() {
    loadCartFromLocalStorage();
    displayOrderSummary();
});

function displayOrderSummary() {
    let summaryDiv = document.getElementById('orderSummary');
    summaryDiv.innerHTML = '';
    
    cart.forEach((item) => {
        let itemDiv = document.createElement('div');
        itemDiv.className = 'order-item';
        itemDiv.innerHTML = `
            <span>${item.name} x ${item.quantity}</span>
            <span>${(item.price * item.quantity)} EGP</span>
        `;
        summaryDiv.appendChild(itemDiv);
    });

    let totalDiv = document.createElement('div');
    totalDiv.className = 'order-total';
    totalDiv.innerHTML = `
        <span>Total:</span>
        <span>${getCartTotal()} EGP</span>
    `;
    summaryDiv.appendChild(totalDiv);
}

function validateCheckoutForm() {
    let firstName = document.getElementById('firstName').value.trim();
    let lastName = document.getElementById('lastName').value.trim();
    let email = document.getElementById('email').value.trim();
    let phone = document.getElementById('phone').value.trim();
    let address = document.getElementById('address').value.trim();
    let city = document.getElementById('city').value.trim();
    let zipCode = document.getElementById('zipCode').value.trim();

    if (!firstName || !lastName || !email || !phone || !address || !city || !zipCode) {
        showError('Please fill in all required fields');
        return false;
    }

    return true;
}

function showError(message) {
    let errorDiv = document.getElementById('errorMessage');
    errorDiv.innerText = message;
    errorDiv.style.display = 'block';
    setTimeout(() => {
        errorDiv.style.display = 'none';
    }, 4000);
}
function submitOrder() {
    let formData = new FormData(document.getElementById('checkoutForm'));

    fetch('DB_order.php', {
        method: 'POST',
        body: formData
    })
    .then(res => res.text())
    .then(data => {

        if (data.trim() === "success") {

            document.getElementById('checkoutForm').style.display = "none";
            document.getElementById('confirmationMessage').style.display = "block";
            document.getElementById('homeButton').style.display = "inline-block";
            document.getElementById('orderSummary').style.display = "block";
            displayOrderSummary();

            // Clear cart after successful order
            cart = [];
            localStorage.removeItem('auraCart');
            updateCartCount();

        } else {
            showError("Error while placing order");
        }

    });
}
</script>
</body>
</html>
