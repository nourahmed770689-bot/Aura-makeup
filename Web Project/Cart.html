<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - AURA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
    <a href="Home.html">Home</a>
    <div class="dropdown">
        <button onclick="toggleDropdown()" class="dropbtn">Products <i class="fas fa-caret-down"></i></button>
        <div id="dropdown-content" class="dropdown-content">
            <a href="Products.html">All Products</a>
            <a href="Products.html?category=face">Face</a>
            <a href="Products.html?category=eyes">Eyes</a>
            <a href="Products.html?category=lips">Lips</a>
            <a href="Products.html?category=blusher">Blusher</a>
        </div>
    </div>
    <a href="Tips.html">Tips</a>
    <span class="logo">AURA</span>
    <a href="About us.html">About Us</a>
    <a href="Contact.html">Contact</a>
    <a href="Cart.html">🛒 Cart (<span id="cartCount">0</span>)</a>
</div>

<main class="cart-container">
    <h1>Your Shopping Cart</h1>

    <div id="cartItems" class="cart-items">
        <!-- Cart items will be rendered here -->
    </div>

    <div class="cart-summary">
        <div class="cart-total">
            <h2>Total: <span id="cartTotal">0 EGP</span></h2>
        </div>
        <div class="cart-actions">
            <button class="continue-shopping-btn" onclick="window.location.href='Products.html'">Continue Shopping</button>
            <button class="checkout-btn" onclick="checkout()">Proceed to Checkout</button>
        </div>
    </div>
</main>

<script src="Script.js"></script>
</body>
</html>
